<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Calorie Bank</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Barcode scanner library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>🥗 Calorie Bank</h1>
      <button id="settingsToggle" class="icon-btn">⚙️</button>
    </header>
    <main>
      <!-- HOME -->
      <section id="homeView" class="view active">
        <div class="balance-card">
          <div class="ring-container">
            <canvas id="ringCanvas" width="200" height="200"></canvas>
            <div class="balance-number" id="balanceDisplay">0</div>
          </div>
          <div class="balance-label">kcal available</div>
          <div class="rate-info" id="rateDisplay">+104 kcal/hour</div>
        </div>

        <div class="quick-actions">
          <button class="quick-btn" data-cals="100">+100</button>
          <button class="quick-btn" data-cals="200">+200</button>
          <button class="quick-btn" data-cals="500">+500</button>
          <button class="quick-btn custom" id="customAddBtn">+ Custom</button>
          <button class="quick-btn scan-btn" id="scanBarcodeBtn">📷 Scan</button>
        </div>

        <div class="food-search">
          <input type="text" id="foodSearch" placeholder="Search food (UK/US)" />
          <button id="searchFoodBtn">🔍</button>
        </div>
        <div id="foodResults" class="food-results"></div>

        <div class="manual-add">
          <input type="number" id="manualCals" placeholder="Or type calories" />
          <button id="manualAddBtn">Add</button>
        </div>
      </section>

      <!-- LOG -->
      <section id="logView" class="view">
        <h2>History</h2>
        <div id="logList"></div>
      </section>

      <!-- SETTINGS -->
      <section id="settingsView" class="view">
        <h2>Settings</h2>
        <div class="setting-group">
          <label>Daily Target (kcal)</label>
          <input type="number" id="targetInput" value="2500" />
          <button id="updateTargetBtn">Update Target</button>
        </div>
        <div class="setting-group">
          <label>Reset All Data</label>
          <button id="resetAllBtn" class="danger">🗑️ Reset Everything</button>
        </div>
        <div class="setting-group">
          <label>Set Current Balance</label>
          <input type="number" id="balanceOverride" placeholder="Enter kcal" />
          <button id="setBalanceBtn">Set Now</button>
        </div>
        <div class="setting-group">
          <label>Food Database Region</label>
          <select id="regionSelect">
            <option value="gb">🇬🇧 UK</option>
            <option value="us">🇺🇸 US</option>
          </select>
        </div>
        <div class="setting-group">
          <button id="exportBtn">⬇ Export Backup</button>
          <button id="importBtn">⬆ Import Backup</button>
          <input type="file" id="importFileInput" accept=".json" style="display:none" />
        </div>
      </section>
    </main>

    <nav>
      <button class="nav-btn active" data-view="homeView">🏠 Home</button>
      <button class="nav-btn" data-view="logView">📋 Log</button>
      <button class="nav-btn" data-view="settingsView">⚙️ Settings</button>
    </nav>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3 id="editDayTitle">Edit Day</h3>
      <div id="editMealList"></div>
      <div class="edit-add">
        <input type="number" id="editMealCals" placeholder="Add meal (kcal)" />
        <button id="editAddMealBtn">+</button>
      </div>
      <button id="editSaveBtn">Save Changes</button>
    </div>
  </div>

  <!-- BARCODE SCANNER MODAL -->
  <div id="scannerModal" class="modal">
    <div class="modal-content scanner-modal">
      <span class="close-modal" id="closeScannerBtn">&times;</span>
      <h3>📷 Scan Barcode</h3>
      <div id="scannerContainer" style="width:100%; max-width:400px; margin:0 auto;"></div>
      <p style="font-size:12px; color:#64748b; margin-top:8px;">Point at any food barcode</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
